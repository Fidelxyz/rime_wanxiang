#使用之前请详细遍历每一行，都注释了功能点，看清楚是不是你要的，需不需要修改参数，哪些该留，哪些该删除，够语重心长了吧😄
patch:
  speller/algebra:
    __patch:
      #- 模糊音                                  # 这里启用后，本文件末尾可配置具体条目
      - wanxiang_algebra:/base/全拼  # 可选输入方案名称：全拼，自然码, 自然龙, 汉心龙，小鹤双拼, 搜狗双拼, 微软双拼, 智能ABC, 紫光双拼, 国标双拼，拼音加加，乱序17
      ##########################以上格式受指令初始化控制，最好保持格式不变，如果发生变更请不要使用指令修改相关数据#####################################
    #custom_phrase/user_dict: custom_phrasexx    # 这里改成什么就需要手动创建同名的 custom_phrasexx.txt 文件在用户目录，这个文件主要用于置顶，编码为自定义编码的词汇
    #translator/packs/+:
    #- userxx                                  #导入根目录下名称为userxx.dict.yaml的自定义固定词典，编码要与固定词库一致，编码权重都不要少，形如姓名、专有名词公司名称等等
  #下面是候选数量
  menu/page_size: 6  #候选词个数

  super_comment:  # 超级注释模块，子项配置 true 开启，false 关闭
    candidate_length: 2  # 候选词辅助码提醒的生效长度，0为关闭  但同时清空其它，应当使用上面开关来处理
    corrector_type: "〔comment〕"  # 随意更换左右括号，比如"〔comment〕" 不加括号为无括号，comment占位不能动
    cand_type:
      user_phrase: ""
      sentence: "∞"
      phrase: ""
      table: ""
      user_table: ""
      completion: ""
      abbrev: ""
      fallback: "~"

  super_processor:
    enable_backspace_limit: true  # 开启/关闭退格限制
    enable_seg_loop: true  # 开启/关闭分词符（'）循环
    enable_predict_space: true  # 启用联想空格打断，直接上屏空格并清空联想，对齐大厂
    kp_number_mode: auto  # 小键盘模式 (auto / compose)
    limit_repeated: "8,40"  #格式："最大重复声母数,最大候选字数"
    select_character: "[,]"  # 开启以词定字，自动拆解第一位上屏首字，第二位上屏尾字
    # 下面这些写法都支持：
    # select_character: "[,]"                      # [ 上屏首字，] 上屏尾字（推荐）
    # select_character: "bracketleft, bracketright"  # [ 上屏首字，] 上屏尾字（英文全拼）

  # 下面这个快解除注释后就能用预测，下载地址：https://cnb.cool/amzxyz/rime-wanxiang/-/releases/download/model/wanxiang-lts-zh-hans-predict.db
  #'engine/processors/@before 0': predictor
  #'engine/translators/@before 0': predict_translator
  #switches/+:
  #  - name: prediction
  #    states: [ 预测关, 预测开 ]
  #predictor:
  #  db: wanxiang-lts-zh-hans-predict.db
  #  max_candidates: 10
  #  max_iterations: 1

  super_replacer:
    db_name: lua/replacer
    delimiter: "|"
    comment_format: "〔%s〕"
    chain: true  #true表示流水线作业，上一个option产出交给下一个处理，典型的s2t>t2hk=s2hk，false就是并行，直接用text转换
    rules:
      # 场景1：输入 '哈哈' -> 变成 '1.哈哈 2.😄'
      - option: emoji  # 开关名称与上面开关名称保持一致
        mode: append  # 新增候选append 替换原候选replace 替换注释comment 简码模式abbrev匹配输入编码置顶词组
        comment_mode: none  # 注释模式: "append"(原候选注释继承), "text"(原候选文本放在注释), "none"(空，默认)
        tags: [abc]  # 生效的tag
        prefix: "_em_"  # 前缀用于区分同一个数据库的不同用途数据
        files:
          - lua/data/emoji.txt
      # 场景2：用于常驻的直接替换 option: true
      - option: true
        mode: append  # <--- 新增候选模式
        comment_mode: none
        tags: [abc]
        prefix: "_ot_"
        files:
          - lua/data/others.txt
      # 场景4：用于简繁转换的直接替换
      - option: [s2t, s2hk, s2tw]  #后面依赖这条流水线有一个开关为true这条流水线就能工作
        mode: replace  # <--- 替换原候选模式
        comment_mode: append
        sentence: true  # <--- 句子级别替换
        tags: [abc]
        prefix: "_s2t_"
        files:
          - lua/data/STCharacters.txt
          - lua/data/STPhrases.txt
      - option: s2hk
        mode: replace  # <--- 替换原候选模式
        comment_mode: append
        sentence: true  # <--- 句子级别替换
        tags: [abc]
        prefix: "_s2hk_"
        files:
          - lua/data/HKVariants.txt
      - option: s2tw
        mode: replace  # <--- 替换原候选模式
        comment_mode: append
        sentence: true  # <--- 句子级别替换
        tags: [abc]
        prefix: "_s2tw_"
        files:
          - lua/data/TWVariants.txt
      - option: abbrev  # 对应上面开关名称
        mode: abbrev  # <--- 简码模式
        tags: [abc]
        prefix: "_abbr_"
        abbrev_rule: "1,6"
        # 前置数量1，前置位置6,数量说的是你维护得数据库编码后面分割了几个词前几个要前置显示,位置说的是你要前置到第二候选还是第几
        # 然后空码或只有英文等自定义词组的时候直接全部兜底显示,这个新的设计简化的应用层面,我们只需要维护一个数据库即可.
        files:
          - lua/data/abbrev.txt
          - lua/data/chengyu.txt

  # 字符集过滤lua
  # a,通用规范汉字表
  # b,GB2312,
  # g,GBK,
  # T,Big5,(台港澳常用)
  # j,简体,OpenCC (t2s)
  # f,通用繁体,OpenCC (s2t)
  # h,香港繁体, OpenCC (s2hk)
  # t,台湾繁体, OpenCC (s2tw)
  # u,基本区,U+4E00 - U+9FFF
  # A-I,扩展 A-I 区,U+3400 及各扩展区 (支持到 Ext-I)
  # c,兼容区汉字
  # 你可以通过黑白名单微调你自己每个开关下面的字符集过滤清单，主数据库位于lua/charset.reverse.bin不可编辑
  # 你可以按上面提到的规则代号在base处填写上基础集，还可以在每一个开关的开白名单设置微调数据，就像默认添加的字符集过滤在8105基础上新增了一些
  # 你可以定义多个开关，多个开启状态的开关求并集，比如charset_filter开着，s2hk也开着，那么就会显示这两个集合的所有汉字
  # 优雅的地方在于s2hk开着，charset_filter关着 我们照样能使用 港繁能用到的所有字，是真正的本体，无关字会被过滤，而当都开着则是享受简体转换成繁体的后的结果
  # 这个设计真正的兼容了简繁转换与字符集过滤的矛盾，还能满足用户多种自定义需求，你可以在开关增加类别，并在charset下面新增option类去选择按照字区去过滤，等多种组合方式
  charset:
    - option: charset_filter
      base: a  #可以填入多个类别如aj
      addlist:
        - "诶濛硷氽尛躝〇冇吔咗囧屌鲶芶咲畑垅𰻝𰻞"
      blacklist: []
    - option: s2t
      base: fa
      addlist: []
      blacklist: []
    - option: s2hk
      base: ha
      addlist: []
      blacklist: []
    - option: s2tw
      base: ta
      addlist: []
      blacklist: []

  #下面用来改变你的windows小狼毫右下角软件图标
  #schema/+:
  #  icon: "icons/zhong.ico"
  #  ascii_icon: "icons/ying.ico"
  key_binder/sequence:  # Lua 配置：手动排序的快捷键 super_sequence.lua，不要用方向键，各种冲突，一定要避免冲突
    up: "Control+j"  # 上移
    down: "Control+k"  # 下移
    reset: "Control+l"  # 重置
    pin: "Control+p"  # 置顶

  #translator/enable_user_dict: true  # 是否开启自动调频用户词，如果你希望使用下面``造词功能，请保持false，因为两个跨翻译器会造成词汇不能正常记录

#以下恢复``造词功能，也就是平时不记录，引导才记录，按需造词，如果你想恢复这个功能，请取消注释----
#recognizer/patterns/add_user_dict: "^``[A-Za-z/`']*$"      #自造词引导方式
#user_dict_set/enable_user_dict: true
#add_user_dict/enable_user_dict: true
# 取消注释以开启自动无词频造词
#add_user_dict/enable_auto_phrase: true
#按需造词全功能段落结束---------------------------------------------------------------

模糊音:
  __append:
    # n - l
    - derive/^l/n
    - derive/^n/l
    # r - y     开头
    - derive/^y/r
    - derive/^r/y
    # h - f     开头
    - derive/^h/f
    - derive/^f/h
    # r - l     开头
    - derive/^r/l
    - derive/^l/r
    # k - g     开头
    - derive/^k/g
    - derive/^g/k
    # en - eng
    - derive/(ē|é|ě|è|e)ng(.*)$/$1n$2
    - derive/(ē|é|ě|è|e)n(.*)$/$1ng$2
    # in - ing
    - derive/(ī|í|ǐ|ì|i)ng(.*)$/$1n$2
    - derive/(ī|í|ǐ|ì|i)n(.*)$/$1ng$2
    # c - ch
    - derive/^c([^h]*)/ch$1
    - derive/^ch/c
    # z - zh
    - derive/^z([^h]*)/zh$1
    - derive/^zh/z
    # s - sh
    - derive/^s([^h]*)/sh$1
    - derive/^sh/s
